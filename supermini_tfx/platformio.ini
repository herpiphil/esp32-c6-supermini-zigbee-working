; =============================================================
; Date:    2026-04-09
; Project: supermini_tfx — ESP32-C6 SuperMini Zigbee Button Switch
; Notes:   Based on working C6Test2 build.
;          SuperMini uses native USB CDC (VID 303a:1001, ttyACM0),
;          no CH343 bridge. ARDUINO_USB_CDC_ON_BOOT=1 required.
;          Board is devkitm-1 (4MB), same chip as devkitc-1.
; =============================================================

[env:esp32-c6-supermini]
platform  = espressif32
board     = esp32-c6-devkitm-1
framework = arduino

build_flags =
    -DZIGBEE_MODE_ED
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

board_build.partitions = zigbee.csv

monitor_speed = 115200

upload_protocol = esp-builtin
